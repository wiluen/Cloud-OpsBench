fault_category: "Admission Control"
failure_mode: "NamespaceMemoryQuotaExceeded"
general_description: "Memory-request quota caps the total memory available in the namespace. When the sum of existing memory requests plus the new Pod’s request exceeds the hard limit, the API Server rejects the Pod."
cases:
  - id: 1
    sub_scenario: "Total Memory Request Exceeds Quota"
    description: "After a Namespace is configured with a hard limit on total memory requests via ResourceQuota, a cumulative amount of memory requests from existing running Pods in the Namespace has already consumed a significant portion of the quota. When a new Deployment (with Pods specifying memory requests) is deployed, the sum of the existing cumulative memory requests and the memory requests of the new Pods exceeds the hard quota limit for memory requests. As a result, the Kubernetes API Server rejects the creation request for the new Pods, leading to failed Pod instantiation and insufficient available replicas for the Deployment."
    trigger_condition: "1. A ResourceQuota defining a hard limit on total memory requests (`requests.memory`) is created in the target Namespace (e.g., default/boutique); 2. Multiple running Pods exist in the Namespace, with their combined `resources.requests.memory` values consuming a substantial portion of the memory request quota; 3. Deploy a new Deployment with Pods that specify memory requests, such that the sum of existing cumulative memory requests and the new Pods' memory requests exceeds the hard quota limit; 4. The creation of new Pods is rejected, and event logs display a quota exhaustion error message in the format: `exceeded quota: <quota-name>, requested: requests.memory=<new-request>, used: requests.memory=<total-used>, limited: requests.memory=<quota-limit>`."
    precondition:
      description: |
        1. Create a ResourceQuota with requests.memory: "512Mi" (hard limit) in the target Namespace to restrict the total memory resource requests;
        2. Ensure the sum of requests.memory from all existing Pods in the Namespace equals or is below the quota limit.
      pre_yaml_snippet:
        apiVersion: v1
        kind: ResourceQuota
        metadata:
          name: memory-request-quota
          namespace: default  # Align with the Namespace of existing memory-consuming Pods
        spec:
          hard:
            requests.memory: "3Gi"  # Hard limit for total memory requests in the Namespace
    minimal_yaml_snippet: "# No need to modify, not caused by user application"
    trigger_commands:
      - "kubectl apply -f <pre-yaml-file>"
      - "kubectl apply -f <yaml-file>"