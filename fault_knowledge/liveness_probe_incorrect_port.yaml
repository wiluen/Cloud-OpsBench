---
fault_category: Runtime"
failure_mode: "LivenessProbeIncorrectPort"
general_description: |
  This failure occurs when the port specified in a Pod's Liveness Probe is incorrectly configured and does not match the actual port where the application is listening for health checks. 
  Because the Kubelet attempts to perform liveness checks on a closed or unassigned port, the check fails consistently. Unlike readiness probes, continuous liveness probe failures trigger Kubernetes to terminate and restart the container. This results in a 'CrashLoopBackOff' or a perpetual restart cycle, preventing the application from ever becoming stable.
cases:
  - id: 1
    sub_scenario: "Mismatch between configured and container listening port"
    description: |
      The application inside the container is healthy and listening on a specific port (e.g., 50051), but the liveness probe is pointed to a different, non-listening port (e.g., 50052). The Kubelet fails to connect to the incorrect port and assumes the application is dead, subsequently killing and restarting the container repeatedly despite the process itself being functional.
    trigger_condition: |
      1. The application inside the container listens on port 50051.
      2. The `livenessProbe` (HTTP, TCP, or gRPC) is configured with `port: 50052`.
    minimal_yaml_snippet:
      spec:
        containers:
          - name: service
            ports:
              - containerPort: 50051  # Health check port actually listened on by the container
            livenessProbe:
              grpc:
                port: 50052  # Error: Probe port mismatches the container's listening port (50051)
    trigger_commands:
      - "kubectl apply -f <yaml-file>"

