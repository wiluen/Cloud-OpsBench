---
fault_category: "Startup"
failure_mode: "MissingImagePullSecret"
general_description: "The Pod fails to pull an image from a private registry (e.g., ghcr.io, private Docker Registry) due to missing or misconfigured authentication credentials. Even if a Secret with credentials exists, the pull fails if the Pod does not reference it via `imagePullSecrets`, or the referenced Secret is invalid/expired. Pod status: `ImagePullBackOff`/`ErrImagePull`; Events: `401 Unauthorized` or `authentication required`."

cases:
  - id: 1
    sub_scenario: "Attempting to pull from a private registry without credentials"
    description: "The Pod tries to pull an image from a private registry (e.g., `ghcr.io`) but lacks `imagePullSecrets` in its specification. Since the registry requires authentication, the pull fails due to missing credentials."
    trigger_condition: "1. The Pod references a private image (e.g., `ghcr.io/testuser177/solar-system:latest`); 2. The Pod spec does *not* include `imagePullSecrets`; 3. After `kubectl apply`, Pod status is `ImagePullBackOff`/`ErrImagePull` with events containing `401 Unauthorized` or `authentication required`."
    minimal_yaml_snippet:
      spec:
        containers:
          - name: notifications
            image: ghcr.io/testuser177/solar-system:latest  # Critical: Private registry image without auth
    trigger_commands:
      - "kubectl apply -f <yaml-file>"


  - id: 2
    sub_scenario: "Pod references a non-existent imagePullSecrets"
    description: "The Pod configures `imagePullSecrets` but references a Secret that does not exist in the namespace (name is incorrect or uncreated). Credentials cannot be loaded, causing private image pull failure. Events show `secret [name] not found`."
    trigger_condition: "1. The Pod references a private image and configures `imagePullSecrets` with a non-existent Secret (e.g., `non-existent-secret`); 2. After `kubectl apply`, Pod status is `ImagePullBackOff`/`ErrImagePull` with events containing `secret \"non-existent-secret\" not found`."
    minimal_yaml_snippet:
      spec:
        containers:
          - name: notifications
            image: ghcr.io/testuser177/solar-system:latest  # Private registry image
        imagePullSecrets:
          - name: non-existent-secret  # Critical error: Referencing a non-existent Secret
    trigger_commands:
      - "kubectl apply -f <yaml-file>"