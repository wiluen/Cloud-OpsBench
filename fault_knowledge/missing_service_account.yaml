---
fault_category: "Admission Control"
failure_mode: "MissingServiceAccount"
general_description: "If the Pod template references a non-existent ServiceAccount, the API Server blocks Pod creation with “forbidden: serviceaccount <sa>"
cases:
  - id: 1
    sub_scenario: "Service Account Misspelled"
    injectable: "yes"
    description: "A user attempts to deploy a Deployment, but the Service Account name referenced in the Pod template (e.g., 'services' instead of the correct 'service') is misspelled and does not exist in the target namespace. The API Server immediately rejects the Pod creation request with a 'serviceaccount not found' error, and no Pods are instantiated for the Deployment."
    trigger_condition: "1. A valid Service Account named 'service' exists in the target namespace (e.g., boutique), but 'services' (plural/misspelled) does not; 2. The `serviceAccountName` field in the Deployment's Pod template is explicitly set to 'services'; 3. After executing `kubectl apply`, the Deployment's `READY` status shows 0/1 (or 0/N) replicas; 4. `kubectl describe deployment <deploy-name>` shows 'FailedCreate' events with the error 'pods <pod-name> is forbidden: serviceaccount `services` not found in namespace."
    minimal_yaml_snippet:
      spec:
        serviceAccountName: "services"  # Critical error: Misspelled (non-existent) Service Account
        containers:
          - name: nginx
            image: nginx:alpine
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"

      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: service
    trigger_commands:
      - "kubectl apply -f <yaml-file>"

  - id: 2
    sub_scenario: "Service Account Does Not Exist: Not Created"
    injectable: "yes"
    description: "The Deployment references a Service Account name (e.g., 'my-app-sa') that is intended for use but has not been created in the target namespace. The API Server cannot resolve the Service Account reference, leading to immediate rejection of Pod creation. Unlike misspelling, this scenario involves a valid name that simply lacks a corresponding Service Account resource in the namespace."
    trigger_condition: "1. No Service Account named 'my-app-sa' exists in the target namespace (verify via `kubectl get sa -n <namespace>`); 2. The `serviceAccountName` field in the Deployment's Pod template is set to 'my-app-sa'; 3. After `kubectl apply`, the Deployment remains at 0 available replicas; 4. `kubectl get events -n <namespace>` shows ReplicaSet events with 'FailedCreate' reason and 'serviceaccount my-app-sa not found' message;"
    minimal_yaml_snippet:
      spec:
        serviceAccountName: "my-app-sa"  # Critical error: Service Account not created in namespace
        containers:
          - name: nginx
            image: nginx:alpine
    trigger_commands:
      - "kubectl apply -f <yaml-file>"